name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Lint, typecheck & build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm biome check --max-diagnostics=500 .

      - name: Typecheck
        run: pnpm tsc --noEmit

      - name: Build library
        run: pnpm build

      - name: Upload library dist
        uses: actions/upload-artifact@v7
        with:
          name: library-dist
          path: dist/
          retention-days: 1

  docs:
    name: Build docs
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download library dist
        uses: actions/download-artifact@v4
        with:
          name: library-dist
          path: dist/

      - name: Build docs site
        run: pnpm docs:build

  examples:
    name: Build examples
    runs-on: ubuntu-latest
    needs: ci

    strategy:
      matrix:
        example: [react-sample, vue-sample, svelte-sample]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download library dist
        uses: actions/download-artifact@v4
        with:
          name: library-dist
          path: dist/

      - name: Build ${{ matrix.example }}
        run: pnpm --filter @wearesyntesa/karbit-ui-${{ matrix.example }} build

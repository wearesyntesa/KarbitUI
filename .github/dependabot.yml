version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Jakarta
    open-pull-requests-limit: 10
    groups:
      biome:
        patterns:
          - "@biomejs/*"
      vite:
        patterns:
          - "vite"
          - "vite-*"
      typescript:
        patterns:
          - "typescript"
          - "@types/*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "postcss"
          - "autoprefixer"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Jakarta
